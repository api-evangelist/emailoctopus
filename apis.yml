aid: emailoctopus
url: https://raw.githubusercontent.com/api-evangelist/emailoctopus/refs/heads/main/apis.yml
name: EmailOctopus
kind: company
description: EmailOctopus is an affordable email-marketing platform for newsletters,
  campaigns, automations, and audience management. Its REST API (v2 at
  https://api.emailoctopus.com, Bearer authenticated) lets developers manage lists,
  contacts, custom fields, tags, campaigns, automations, and campaign reports
  programmatically.

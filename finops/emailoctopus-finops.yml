description: >-
  FinOps view of EmailOctopus spend. EmailOctopus bills on a subscription
  basis priced by the number of subscribers on the account, with a free
  Starter tier and a paid Pro tier. Cost scales with list size rather than API
  usage or emails sent, so the primary cost lever is subscriber count and list
  hygiene. Annual billing and nonprofit status provide discounts.
notes: >-
  Subscriber-tier prices are subject to change; verify against the EmailOctopus
  pricing page during reconciliation.
sources:
- https://emailoctopus.com/pricing
- https://help.emailoctopus.com/article/9-how-does-emailoctopus-pricing-work

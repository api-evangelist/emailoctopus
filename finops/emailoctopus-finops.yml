meters:
- name: subscribers
  description: Number of subscribers on the account, the primary driver of the Pro plan price.
  unit: subscribers
  aggregation: max
  dimensions:
  - account
  - list
- name: emails_sent
  description: Emails sent per month, capped by plan (10,000/month on the free Starter tier).
  unit: emails
  aggregation: sum
  dimensions:
  - account
  - campaign
- name: plan_subscription
  description: Recurring monthly or annual subscription charge for the active plan tier.
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - plan
principles:
- name: Visibility
  description: Track subscriber count and plan tier; review monthly subscription invoices.
- name: Allocation
  description: Map list and subscriber growth to teams or campaigns to attribute cost.
- name: Optimization
  description: Prune inactive and unsubscribed contacts to stay in a lower subscriber tier; use annual billing and nonprofit discounts where eligible.
- name: Accountability
  description: Assign an owner for list hygiene and plan-tier decisions; review against budget monthly.
